{% extends "base.html" %}

{% block content %}
  <h1>Create Note</h1>
  <div class="card">
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <div style="margin-top: 1.5rem;">
        <button type="submit" class="btn btn-primary">Save Note</button>
        <a href="{% url 'notes:list' %}" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
{% endblock %}
