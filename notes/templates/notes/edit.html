{% extends "base.html" %}

{% block content %}
<div class="mb-4 d-flex justify-content-between align-items-center">
  <h1 class="mb-0">Edit Note</h1>
  <a href="{% url 'notes:detail' note.pk %}" class="btn btn-outline-secondary btn-sm">&larr; Back to Note</a>
</div>

<div class="card shadow-sm" style="border-top: 4px solid {{ note.color }};">
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <div class="d-flex gap-2 mt-4">
        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a href="{% url 'notes:detail' note.pk %}" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
