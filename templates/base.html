<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Notes Manager — create, search, and organise your notes.">
  <title>{% block title %}Notes Manager{% endblock %}</title>

  <!-- Bootstrap 5 CSS (CDN) -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous">

  <!-- Custom styles -->
  {% load static %}
  <link rel="stylesheet" href="{% static 'notes/css/styles.css' %}">
  <link rel="stylesheet" href="{% static 'notes/css/darkmode.css' %}">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-md shadow-sm custom-navbar">
    <div class="container">
      <a class="navbar-brand fw-bold" href="{% url 'notes:list' %}">📝 Notes Manager</a>

      <button class="navbar-toggler" type="button"
              data-bs-toggle="collapse" data-bs-target="#mainNavbar"
              aria-controls="mainNavbar" aria-expanded="false"
              aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="mainNavbar">
        <ul class="navbar-nav ms-auto gap-1">
          <li class="nav-item">
            <a class="nav-link" href="{% url 'notes:list' %}">All Notes</a>
          </li>
          <li class="nav-item d-flex align-items-center">
            <a class="btn btn-primary btn-sm text-white px-3 ms-2"
               href="{% url 'notes:create' %}">+ New Note</a>
          </li>
          <li class="nav-item ms-md-2 mt-2 mt-md-0 d-flex align-items-center">
            <button id="themeToggle" class="btn btn-sm btn-outline-secondary">
              🌙 Dark Mode
            </button>
          </li>
          <!-- Auth links -->
          {% if user.is_authenticated %}
            <li class="nav-item d-flex align-items-center ms-md-3 mt-2 mt-md-0">
              <span class="navbar-text fw-medium py-0 me-2">👋 {{ user.username }}</span>
            </li>
            <li class="nav-item d-flex align-items-center mt-2 mt-md-0">
              <form method="post" action="{% url 'logout' %}" class="d-inline m-0 p-0">
                {% csrf_token %}
                <button type="submit" class="btn btn-sm btn-outline-danger">Logout</button>
              </form>
            </li>
          {% else %}
            <li class="nav-item d-flex align-items-center ms-md-3 mt-2 mt-md-0">
              <a class="btn btn-sm btn-primary text-white" href="{% url 'login' %}">Login</a>
            </li>
          {% endif %}
        </ul>
      </div>
    </div>
  </nav>

  <!-- Main content -->
  <main class="container py-4 flex-grow-1">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="mt-auto py-4 text-center" style="border-top: 1px solid var(--border);">
    <div class="container">
      <small class="text-muted">
        &copy; {% now "Y" %} Notes Manager. Designed &amp; built by Sujan.
      </small>
    </div>
  </footer>

  <!-- Bootstrap 5 JS bundle (CDN) -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmW7MRtEDCx/1GIHoKJSe6X1HIM"
    crossorigin="anonymous"></script>

  <!-- Custom scripts -->
  <script src="{% static 'notes/js/confirm.js' %}"></script>
  <script src="{% static 'notes/js/unsaved.js' %}"></script>
  <script src="{% static 'notes/js/darkmode.js' %}"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function() {
      document.querySelectorAll('.color-bg-target').forEach(el => el.style.backgroundColor = el.dataset.color);
      document.querySelectorAll('.color-border-target').forEach(el => {
        if (el.id === 'color-preview') { el.style.borderColor = el.dataset.color; } 
        else { el.style.borderTopColor = el.dataset.color; }
      });
    });
  </script>
</body>
</html>
